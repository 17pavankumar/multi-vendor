[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py"]
addopts = "-ra"

[tool.ruff]
line-length = 110
target-version = "py312"
# Django migrations are generated code — linting them for style just
# creates noise every time makemigrations runs.
extend-exclude = ["**/migrations/*.py"]

[tool.ruff.lint]
# E/F = pyflakes+pycodestyle core, I = import sorting, B = flake8-bugbear
# (catches real bugs like mutable default args), DJ = Django-specific checks.
select = ["E", "F", "I", "B", "DJ"]
