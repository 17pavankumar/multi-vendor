name: CI

# Runs on every push and PR against main. Two independent jobs because
# they verify two different things: `schema-sql` proves db/schema.sql
# (the hand-written source of truth) actually executes on real MySQL;
# `backend` proves the Django app — lint, models/migrations, and the
# real test suite — works end to end, also against real MySQL. Neither
# could be verified locally during development (no Docker/MySQL in
# that environment), so this workflow is the first real proof both
# actually work, and it re-proves it on every future change.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema-sql:
    name: Validate db/schema.sql against MySQL 8
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        # GitHub Actions blocks the job's own steps from starting until
        # this health check passes, so no manual "wait for MySQL" loop
        # is needed in the steps below.
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: db/requirements.txt

      # Deliberately not shelling out to an OS `mysql` CLI binary here:
      # Ubuntu's `mysql-client` apt package is a transitional package
      # that actually installs MariaDB's client, which has a history of
      # failing to authenticate against MySQL 8's default
      # caching_sha2_password plugin. mysql-connector-python is
      # Oracle's own driver, pinned in db/requirements.txt, so this
      # step behaves identically on every runner instead of depending
      # on whatever happens to be preinstalled.
      - name: Install schema-validation dependencies
        run: pip install -r db/requirements.txt

      - name: Apply schema.sql
        run: python db/apply_schema.py db/schema.sql --host 127.0.0.1 --port 3306 --user root --password rootpassword

      - name: Sanity-check table count
        run: |
          python -c "
          import mysql.connector
          conn = mysql.connector.connect(host='127.0.0.1', port=3306, user='root', password='rootpassword')
          cursor = conn.cursor()
          cursor.execute(\"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='multivendor'\")
          count = cursor.fetchone()[0]
          print(f'Tables created: {count}')
          assert count == 21, f'expected 21 tables, got {count}'
          "

  backend:
    name: Lint & test backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: multivendor
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      # Deliberately using the MySQL root user for CI's DB connection,
      # not the least-privilege app user schema.sql implies for
      # production — Django's test runner needs CREATE DATABASE
      # privilege to spin up its own test_multivendor database, and
      # granting that to a CI-only ephemeral database is a reasonable
      # trade rather than fighting GRANT statements for a container
      # that's destroyed at the end of the job.
      DB_NAME: multivendor
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      RAZORPAY_KEY_SECRET: ci_placeholder
      RAZORPAY_WEBHOOK_SECRET: ci_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install system deps for mysqlclient
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Apply migrations against real MySQL
        working-directory: backend
        run: python manage.py migrate

      - name: Run tests
        working-directory: backend
        run: pytest
